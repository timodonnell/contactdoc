afdb_version: 4
bigquery_table: "bigquery-public-data.deepmind_alphafold.metadata"
gcs_bucket_prefix: "gs://public-datasets-deepmind-alphafold-v4/"
output_prefix: "./output/contactdoc/v1/"

filters:
  skip_fragments: true
  global_mean_plddt_min: 70.0
  residue_plddt_min: 70.0
  max_seq_len: 2048
  require_single_chain: true
  canonical_residue_policy: "map_to_unk"  # skip_entry | map_to_unk

contacts:
  cutoff_angstrom: 4.0
  exclude_adjacent_residues: true
  heavy_atoms_only: true
  max_contacts_per_doc: 2048
  tie_break: "lex_atom_names"

splits:
  mode: "afdb50"
  seed: "contactdoc-v1"
  train_frac: 0.98
  val_frac: 0.01
  test_frac: 0.01

cluster_files:
  afdb50_rep_mem_tsv_gz: "data/7-AFDB50-repId_memId.tsv.gz"
  structural_rep_mem_tsv_gz: "data/1-AFDBClusters-entryId_repId_taxId.tsv.gz"

parallelism:
  shard_size_entries: 2000
  num_workers_local: 16
  use_modal: false
